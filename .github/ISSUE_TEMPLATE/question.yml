---
name: Question
description: Ask a usage or design question
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for questions that benefit from public visibility. If you are reporting wrong output or a crash, please use the bug report form instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What workflow are you trying to build? Include the relevant TypeScript or generated YAML.
    validations:
      required: true
