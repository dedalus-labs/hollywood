---
name: Feature Request
description: Suggest a workflow authoring, generation, or package feature
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new request, search existing issues first. If the idea already exists, add a reaction or comment there.

        Hollywood intentionally keeps the public API small. The strongest requests show the workflow pain, the target generated YAML, and why existing primitives do not cover it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to express or automate?
      placeholder: |
        I want to generate a workflow that...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed API or behavior
      description: Include a TypeScript example and expected generated YAML if possible.
      placeholder: |
        I would like to write:

        ```ts
        // example
        ```

        and generate:

        ```yaml
        # example
        ```
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How do you handle this today?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TypeScript API
        - CLI
        - GitHub Actions schema
        - expression helpers
        - generated YAML formatting
        - documentation
        - release or packaging
        - other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to open a pull request for this.
          required: false
