---
name: Bug Report
description: Report incorrect generated workflows, CLI behavior, or package issues
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new bug, search existing issues first. If you find the same issue, add a reaction or comment there instead of opening a duplicate.

        Please paste logs, generated YAML, and commands as text when possible. Screenshots are useful for UI problems, but text is easier to reproduce.

  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Include the exact error, generated workflow, stack trace, or npm output with secrets redacted.
      placeholder: |
        Running `hollywood generate ...` produced...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the smallest commands, source snippet, or repository state needed to reproduce the issue.
      placeholder: |
        1. Create `gha/example.ts` with...
        2. Run `npx @dedalus-labs/hollywood generate "gha/**/*.ts" --output .`
        3. Open `.github/workflows/example.yml`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Hollywood have done instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Hollywood version
      description: Run `hollywood --version` or check your package manager lockfile.
      placeholder: "0.0.1-alpha.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: "v24.11.0"
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package manager
      options:
        - npm
        - pnpm
        - yarn
        - bun
        - other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link related PRs, workflows, or GitHub Actions runs if they help explain the issue.
