# @generated by Hollywood. Do not edit by hand.

name: "PR: Merged Flower"
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  pull-requests: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  leave-flower:
    name: Leave Flower
    if: github.repository == 'dedalus-labs/hollywood'
    runs-on: ubuntu-24.04
    steps:
      - name: Leave flower comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ github.token }}
          script: |
            const body = "Here's a flower for all your hard work: 🌸";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commits = context.payload.commits ?? [];
            const shas = new Set(
            	[context.payload.after, ...commits.map((commit) => commit.id)].filter(Boolean),
            );
            const prsByNumber = new Map();

            for (const commit_sha of shas) {
            	const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
            		owner,
            		repo,
            		commit_sha,
            	});

            	for (const pr of prs) {
            		if (pr.merged_at) {
            			prsByNumber.set(pr.number, pr);
            		}
            	}
            }

            if (prsByNumber.size === 0) {
            	core.info("No merged PRs associated with this push; skipping");
            	return;
            }

            for (const pr of prsByNumber.values()) {
            	const comments = await github.paginate(github.rest.issues.listComments, {
            		owner,
            		repo,
            		issue_number: pr.number,
            		per_page: 100,
            	});
            	const alreadyLeft = comments.some(
            		(comment) =>
            			["github-actions[bot]", "cind-bot[bot]"].includes(comment.user?.login) &&
            			comment.body?.trim() === body,
            	);

            	if (alreadyLeft) {
            		core.info("Flower comment already exists on #" + pr.number + "; skipping");
            		continue;
            	}

            	await github.rest.issues.createComment({
            		owner,
            		repo,
            		issue_number: pr.number,
            		body,
            	});
            }
